---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  
  <p class="post-meta">
    <time>{{ page.date | date: "%B %d, %Y" }}</time>
    {% if page.categories %}
      <span>Categories: {{ page.categories | join: ', ' }}</span>
    {% endif %}
    {% if page.tags %}
      <span>Tags: {{ page.tags | join: ', ' }}</span>
    {% endif %}
  </p>
  
  {{ content }}
</article>
